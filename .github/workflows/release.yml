name: Release

# release-please opens/updates a release PR with the next version computed
# from Conventional Commits since the last tag (the "rust" releaser bumps
# Cargo.toml + Cargo.lock). When that PR is merged the action creates the
# tag + GitHub Release; this job then publishes the crate to crates.io.
#
# Security policy: publishing uses crates.io Trusted Publishing (OIDC) — there
# is NO long-lived CARGO_REGISTRY_TOKEN stored in this repo. `id-token: write`
# is required for the OIDC exchange. Configure the trusted publisher on
# crates.io first: crate `floopy-sdk`, owner `FloopyAI`, repo `floopy-rust`,
# workflow `release.yml`, environment `crates-io`.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: publish to crates.io
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: crates-io
      url: https://crates.io/crates/floopy-sdk
    permissions:
      contents: read
      id-token: write # OIDC for crates.io Trusted Publishing
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --all-features --locked

      - name: Package (verify the crate builds from the tarball)
        run: cargo package --locked

      - name: Authenticate to crates.io (Trusted Publishing, OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
